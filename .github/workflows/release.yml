name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Cargo version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          test "$TAG" = "$VERSION"

  build:
    name: Build (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cd target/${{ matrix.target }}/release
          tar czf ../../../claudectl-${TAG}-${{ matrix.target }}.tar.gz claudectl
          cd ../../..
          shasum -a 256 claudectl-${TAG}-${{ matrix.target }}.tar.gz > claudectl-${TAG}-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: claudectl-${{ matrix.target }}
          path: |
            claudectl-*.tar.gz
            claudectl-*.tar.gz.sha256

  publish-crate:
    name: Publish crate
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"

  release:
    name: Release
    needs:
      - build
      - publish-crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/claudectl-*.tar.gz
            artifacts/claudectl-*.tar.gz.sha256

  update-homebrew:
    name: Update Homebrew tap
    needs:
      - build
      - release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: claudectl

      - uses: actions/checkout@v4
        with:
          repository: mercurialsolo/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Render formula
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          cd claudectl
          ./scripts/render-homebrew-formula.sh \
            "$VERSION" \
            "$(awk '{print $1}' ../artifacts/claudectl-${TAG}-aarch64-apple-darwin.tar.gz.sha256)" \
            "$(awk '{print $1}' ../artifacts/claudectl-${TAG}-x86_64-apple-darwin.tar.gz.sha256)" \
            "$(awk '{print $1}' ../artifacts/claudectl-${TAG}-x86_64-unknown-linux-musl.tar.gz.sha256)" \
            "$(awk '{print $1}' ../artifacts/claudectl-${TAG}-aarch64-unknown-linux-musl.tar.gz.sha256)" \
            > ../homebrew-tap/Formula/claudectl.rb

      - name: Commit formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/claudectl.rb
          git diff --cached --quiet && exit 0
          git commit -m "claudectl ${GITHUB_REF#refs/tags/v}"
          git push
